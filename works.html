<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Inter",sans-serif;
overflow:hidden;
color:#111;
background:
linear-gradient(180deg,#fff8f3,#ffe6d8);
}

/* タイトル */
.page-title{
position:fixed;
top:0;
width:100%;
padding:18px;
text-align:center;
font-size:13px;
letter-spacing:2px;
background:rgba(255,248,243,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

/* 横スクロールコンテナ */
.wrapper{
display:flex;
height:100vh;
width:300vw; /* 3画面分 */
transition:transform 0.2s ease;
}

/* 各ページ */
.section{
width:100vw;
height:100vh;
flex-shrink:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* 画像 */
.section img{
width:80%;
height:60vh;
object-fit:cover;
}

/* テキスト */
.info{
margin-top:20px;
text-align:center;
}

.label{
font-size:11px;
letter-spacing:2px;
opacity:.6;
}

.title{
font-size:22px;
margin-top:10px;
}

.desc{
margin-top:8px;
font-size:13px;
opacity:.7;
}

/* ナビ */
.nav{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#ccc;
}

.dot.active{
background:#111;
}

/* モバイル */
@media(max-width:768px){
.section img{
width:90%;
height:50vh;
}
}
</style>
</head>

<body>

<div class="page-title">VIEW WORKS</div>

<div class="wrapper" id="slider">

<!-- 1 -->
<section class="section">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">
<div class="info">
<div class="label">MUSIC</div>
<div class="title">Creative Direction</div>
<div class="desc">横スクロールのメインビジュアル</div>
</div>
</section>

<!-- 2 -->
<section class="section">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<div class="info">
<div class="label">RECORDING</div>
<div class="title">Studio Work</div>
<div class="desc">ドラッグで移動できます</div>
</div>
</section>

<!-- 3 -->
<section class="section">
<img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
<div class="info">
<div class="label">MIX</div>
<div class="title">Sound Design</div>
<div class="desc">スマホはスワイプ対応</div>
</div>
</section>

</div>

<div class="nav">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<script>

const slider = document.getElementById("slider");
const dots = document.querySelectorAll(".dot");

let current = 0;
let startX = 0;
let isDown = false;

/* スライド更新 */
function update(){
slider.style.transform = `translateX(-${current * 100}vw)`;

dots.forEach(d=>d.classList.remove("active"));
dots[current].classList.add("active");
}

/* マウス */
document.addEventListener("mousedown",(e)=>{
isDown = true;
startX = e.clientX;
});

document.addEventListener("mouseup",(e)=>{
if(!isDown) return;
isDown = false;

let diff = e.clientX - startX;

if(diff < -50 && current < 2) current++;
if(diff > 50 && current > 0) current--;

update();
});

/* タッチ */
document.addEventListener("touchstart",(e)=>{
startX = e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{
let endX = e.changedTouches[0].clientX;
let diff = endX - startX;

if(diff < -50 && current < 2) current++;
if(diff > 50 && current > 0) current--;

update();
});

</script>

</body>
</html>
