<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#161616;
background:
radial-gradient(circle at 12% 10%, rgba(255,247,238,0.95) 0%, rgba(255,236,221,0.9) 24%, transparent 48%),
radial-gradient(circle at 88% 12%, rgba(255,243,233,0.95) 0%, rgba(255,220,205,0.75) 22%, transparent 46%),
linear-gradient(180deg, #fff8f3 0%, #ffece1 42%, #ffdcd2 100%);
}

/* タイトル */
.page-title{
position:sticky;
top:0;
width:100%;
padding:18px 0;
text-align:center;
font-size:14px;
letter-spacing:2px;
background:rgba(255,248,243,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(0,0,0,0.08);
z-index:1000;
}

/* セクション */
.section{
width:100%;
}

/* フル幅 */
.full{
width:100%;
height:80vh;
overflow:hidden;
}

.full img{
width:100%;
height:100%;
object-fit:cover;
}

/* テキスト */
.info{
padding:24px 28px 40px;
max-width:900px;
}

.label{
font-size:11px;
letter-spacing:2px;
opacity:.6;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:600;
}

.desc{
margin-top:10px;
font-size:14px;
opacity:.7;
line-height:1.6;
}

/* 2カラム */
.split{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:20px;
padding:20px;
}

.split.reverse{
grid-template-columns:.8fr 1.2fr;
}

.media{
width:100%;
height:70vh;
overflow:hidden;
}

.media img{
width:100%;
height:100%;
object-fit:cover;
}

/* スタック */
.stack{
display:grid;
grid-template-rows:1fr auto;
gap:20px;
}

/* モザイク */
.mosaic{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.mosaic-left{
display:grid;
grid-template-rows:1.2fr .8fr;
gap:20px;
}

.mosaic-left img:first-child{
height:50vh;
}

.mosaic-left img:last-child{
height:30vh;
}

.mosaic-right img{
height:82vh;
}

/* 戻る */
.back{
text-align:center;
padding:40px 0 60px;
}

.back a{
font-size:13px;
letter-spacing:1.5px;
color:#111;
text-decoration:none;
border-bottom:1px solid rgba(0,0,0,0.4);
}

/* モバイル */
@media(max-width:768px){

.full{
height:50vh;
}

.media{
height:45vh;
}

.split,
.split.reverse,
.mosaic{
grid-template-columns:1fr;
padding:14px;
}

.info{
padding:18px;
}

.title{
font-size:18px;
}

}
</style>
</head>

<body>

<div class="page-title">VIEW WORKS</div>

<!-- ① フル幅 -->
<section class="section">
<div class="full">
<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=2000">
</div>
<div class="info">
<div class="label">MUSIC PRODUCTION</div>
<div class="title">Creative Sound Direction</div>
<div class="desc">大きな1枚で世界観を見せるセクション。ここが一番重要。</div>
</div>
</section>

<!-- ② 左大 -->
<section class="section">
<div class="split">
<div class="media">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>
<div class="stack">
<div class="media">
<img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">
</div>
<div class="info">
<div class="label">RECORDING</div>
<div class="title">Studio Session</div>
<div class="desc">大と小を混ぜてリズムを作る。</div>
</div>
</div>
</div>
</section>

<!-- ③ 右大 -->
<section class="section">
<div class="split reverse">
<div class="stack">
<div class="info">
<div class="label">MIXING</div>
<div class="title">Mix & Master</div>
<div class="desc">左右を入れ替えるだけで一気にプロっぽくなる。</div>
</div>
<div class="media">
<img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
</div>
</div>
<div class="media">
<img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81">
</div>
</div>
</section>

<!-- ④ モザイク -->
<section class="section">
<div class="mosaic">
<div class="mosaic-left">
<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">
<img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a">
</div>
<div class="mosaic-right">
<img src="https://images.unsplash.com/photo-1516280030429-27679b3dc9cf">
</div>
</div>
<div class="info">
<div class="label">VISUAL</div>
<div class="title">Live & Performance</div>
<div class="desc">最後は情報量多めで締める。</div>
</div>
</section>

<div class="back">
<a href="index.html">← HOME</a>
</div>

</body>
</html>
