<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Creative Studio</title>

<style>
  body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  /* ここが追加部分 */
  background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
  color:#fff;
}

/* VIEW WORKS 固定 */
.page-title {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.85);
  padding: 20px 0;
  font-size: 48px;
  text-align: center;
  z-index: 100;
  letter-spacing:10px;
}

/* グリッド・カードはトップページと同じ見た目 */
.grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:40px;
  padding:40px 20px;
}

.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  transition:.4s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:rotateX(5deg) rotateY(-5deg) scale(1.03);
}

.card img{
  width:100%;
  display:block;
}

.card p{
  padding:20px;
  text-align:center;
}

a{
  color:white;
  text-decoration:none;
}

.back{
  text-align:center;
  margin:40px;
}
</style>
</head>

<body>

<h1 class="page-title">VIEW WORKS</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4">
<p>Music Production</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<p>Studio Recording</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
<p>Mix & Mastering</p>
</div>

</div>

<div class="back">
<a href="index.html">← HOMEに戻る</a>
</div>

</body>
</html>
