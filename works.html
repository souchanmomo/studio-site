<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Creative Studio</title>

<style>
  body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  /* ここが追加部分 */
  background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
  color:#fff;
}


  /* VIEW WORKS 固定タイトルをナビ風に揃える */
.page-title {
  position: sticky;           /* 上に固定 */
  top: 0;
  width: 100%;               /* 横幅いっぱい */
  background: rgba(0,0,0,0.7); /* INDEXナビと同じ半透明黒 */
  padding: 20px 0;           /* 上下の余白をナビと同じに */
  text-align: center;
  font-size: 14px;           /* INDEXリンクと同じ */
  letter-spacing: 2px;       /* INDEXと同じ */
  color: #fff;
  z-index: 1000;             /* ナビと同じ重なり順 */
  margin: 0;                 /* 上の余白リセット */
}

/* グリッドを画面端まで */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: 200px;
  gap: 0px;       /* カード間の余白なし */
  margin: 0;      /* 画面端まで */
}

/* 大きいカード（横幅いっぱい） */
.card.large {
  grid-column: span 12; /* 画面端まで */
  grid-row: span 1;
}

/* 小さいカード（横幅半分） */
.card.small {
  grid-column: span 6;
  grid-row: span 1;
}

/* カード共通 */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 0;    /* 角丸なし */
  transition: transform 0.4s;
}

.card:hover img {
  transform: scale(1.05);
}

/* 文字を画像の下に表示 */
.card p {
  padding: 10px 20px;
  margin: 0;
  background: #111;   /* 文字用の背景色 */
  color: #fff;
  text-align: center;
  font-size: 16px;
}

a{
  color:white;
  text-decoration:none;
}

.back{
  text-align:center;
  margin:40px;
}
</style>
</head>

<body>

<h1 class="page-title">VIEW WORKS</h1>


  <div class="grid">
  <div class="card large">
    <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=2000" alt="Main Work">
    <p>Music Production</p>
  </div>

  <div class="card small">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=1200" alt="Studio Recording">
    <p>Studio Recording</p>
  </div>

  <div class="card small">
    <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae?q=80&w=1200" alt="Mix & Mastering">
    <p>Mix & Mastering</p>
  </div>
</div>

<div class="back">
<a href="index.html">← HOMEに戻る</a>
</div>

</body>
</html>
